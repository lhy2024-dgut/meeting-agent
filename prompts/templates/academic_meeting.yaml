# ============================================================
# 场景模板：学术组会
# 适用：科研团队例行组会，包含研究进展汇报、论文讨论、导师指导
# ============================================================

# scene：程序内识别键，须唯一；display_name：前端展示名称
scene: 学术组会
display_name: 学术组会
description: 科研团队进度汇报、论文讨论、导师指导与学术交流

# scene_context：附加到通用提示词后面的场景说明，引导 LLM 关注重点
# 支持多行 YAML block scalar（| 保留换行）
scene_context: |
  本次会议类型：学术组会。请重点关注以下内容：
  - 研究进展：实验数据、论文各章节进度、技术攻关情况
  - 问题与挑战：遇到的理论/工程困难和讨论的解决思路
  - 学术建议：导师或同学给出的具体修改意见和方法建议
  - 文献与工具：会上分享的论文、代码库或工具资源

# minutes_headings：minutes 字段的一级分类标题（## 渲染）
# 可由用户在前端自定义覆盖
minutes_headings:
  - 研究进展
  - 问题讨论
  - 学术交流
  - 任务安排

# example：给 LLM 的 few-shot 示例
# description：示例场景描述（展示在 UI 预览中）
# output：单引号包裹，\n 保持字面量（JSON 转义字符），{ } 直接写（loader 会自动转义）
example:
  description: 研究生组会，汇报论文第三章实验进展
  output: '{"topic": "论文实验进展汇报与数据优化方向确定", "minutes": "## 研究进展\n### 实验数据\n- 张同学论文第三章实验准确率达87%，噪声数据场景下泛化性不足\n- 李同学文献综述初稿完成，引用30篇，待导师审阅\n### 论文进度\n- 王同学完成第二章理论部分，第三章实验章节预计下周完成\n## 问题讨论\n- 噪声场景模型泛化差：讨论数据增强和对抗训练两种方案\n- 数据集标注不一致问题：建议引入交叉标注流程\n## 学术交流\n- 李同学分享ICLR最新论文，重点介绍注意力机制改进方法\n- 导师建议将方法与Baseline对比实验补全再投稿", "decisions": "## 实验管理规范\n- 统一使用实验记录模板，须记录超参数、数据集版本、结果\n## 论文要求\n- 对比实验须包含至少3个Baseline，补全后由导师再次审阅", "todos": "## 实验任务\n- 【张同学】优化噪声数据处理，完成对比实验（下周五）\n- 【李同学】修改文献综述并提交导师审阅（本周五）\n## 团队任务\n- 【王同学】完成第三章实验部分初稿（下周一）\n- 【全体】提交本周实验记录（每周日晚24:00前）"}'

# negative_constraints：不应出现的情况，引导 LLM 避免常见错误
negative_constraints:
  - 【强制】禁止在 minutes/decisions/todos 中输出无 ## 标题的散装要点，必须先用 ## 分组再列要点
  - 【强制】decisions 字段必须填写会议中形成的决策和规范，即使仅有一条也必须写，禁止输出"无"或空字符串
  - 【强制】todos 字段必须填写具体的后续任务，即使仅有一条也必须写，禁止输出"无"或空字符串；minutes 中的"任务安排"是汇总说明，todos 字段是机器可解析的结构化任务列表，两者必须同时存在
  - 每条要点须写清具体内容（实验结果、修改意见、方案细节等），禁止使用"讨论了XX问题""汇报了XX进展"等笼统表述
  - 不要把实验数据和理论分析混写在同一个三级标题下
  - 不要遗漏导师给出的具体修改意见和指导建议
  - 不要将文献讨论归入研究进展，应放在学术交流中
  - todos 中须写明截止日期，无明确日期可写"待定"
  - 不要逐字复述汇报内容，须归纳提炼关键结论
