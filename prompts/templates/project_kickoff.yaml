# ============================================================
# 场景模板：立项评审
# 适用：新项目立项会，评估技术方案、资源规划与可行性
# ============================================================

scene: 立项评审
display_name: 立项评审
description: 新项目立项会议，评估技术方案、资源规划与项目可行性

scene_context: |
  本次会议类型：立项评审。请重点关注以下内容：
  - 项目背景和业务价值（为什么要做，解决什么问题）
  - 技术方案评审（选型理由、架构设计要点）
  - 资源与时间规划（人员配置、成本、里程碑排期）
  - 风险识别与应对措施（技术、进度、依赖风险）
  - 评审结论（通过 / 有条件通过 / 否决，以及前置条件）

minutes_headings:
  - 项目背景与目标
  - 技术方案
  - 资源与排期
  - 风险评估
  - 评审结论

example:
  description: 推荐系统重构立项评审会
  output: '{"topic": "推荐系统重构立项有条件通过，Q3启动", "minutes": "## 项目背景与目标\n- 现有规则推荐系统点击率低于行业均值40%，用户留存持续下滑\n- 目标：6个月内将点击率提升至行业均值，GMV增长15%\n## 技术方案\n### 方案选型\n- 评估协同过滤、双塔模型、DLRM三种方案\n- 选定双塔+实时特征工程，兼顾效果和工程复杂度\n### 架构要点\n- 特征：实时+离线双路，Kafka+Flink处理\n- 服务：TF Serving部署，P99延迟目标<50ms\n## 资源与排期\n- 团队：算法3人+工程2人+产品1人，共6人\n- 预算：GPU服务器费用约30万/年\n- 里程碑：Q3启动→Q4上线A/B测试→Q1全量\n## 风险评估\n- 数据风险：历史数据缺失30%，需清洗补全（高优先级）\n- 技术风险：实时特征延迟可能超标，需压测验证\n- 依赖风险：数据平台改造尚未完成，可能阻塞启动\n## 评审结论\n- 结论：有条件通过\n- 前置条件：数据质量评估报告完成后正式启动", "decisions": "## 评审决议\n- 项目有条件通过立项，满足前置条件后正式启动\n## 实验规范\n- A/B实验须设置严格流量隔离，实验周期不少于2周", "todos": "## 前置任务（启动条件）\n- 【数据团队】完成历史数据质量评估报告（6月15日前）\n- 【算法A】完成双塔模型原型验证（6月20日前）\n## 立项材料\n- 【产品B】更新PRD，补充指标基线和验收标准（本周五）\n- 【工程C】完成GPU服务器资源申请（6月10日前）"}'

negative_constraints:
  - 【强制】禁止在 minutes/decisions/todos 中输出无 ## 标题的散装要点，必须先用 ## 分组再列要点
  - 每条要点须写清具体内容（技术选型理由、风险应对措施、数据指标等），禁止使用"讨论了技术方案""提到了风险"等笼统表述
  - 评审结论（通过/有条件通过/否决）不可省略，且须写明条件
  - 风险识别和应对措施须配对记录，不能只列风险不写应对
  - 技术方案选型须记录选择理由，不能只写最终方案
  - 资源规划须写明人员配置和预算，不能只写时间线
  - 不要把前置条件（启动条件）和后续任务混在一起
