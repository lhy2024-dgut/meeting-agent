# ============================================================
# 场景模板：项目周会
# 适用：软件研发团队例行进度周会，聚焦开发进度、风险与下周计划
# ============================================================

scene: 项目周会
display_name: 项目周会
description: 软件研发团队例行周会，聚焦开发进度、问题风险与下周计划

scene_context: |
  本次会议类型：项目周会。请重点关注以下内容：
  - 各模块本周开发进度（完成情况、进度百分比）
  - 本周遇到的技术问题、阻塞点和风险
  - 技术决策和规范变更
  - 下周具体任务分工和排期

minutes_headings:
  - 开发进度
  - 问题与风险
  - 技术决策
  - 下周计划

example:
  description: 前后端联调周会，讨论进度与上线准备
  output: '{"topic": "联调进度与上线准备事项确认", "minutes": "## 开发进度\n### 前端\n- 论坛模块全部页面完成，含发帖、评论、点赞功能\n- 购物车结算页完成70%，预计周五完成\n### 后端\n- 数据库迁移至云服务完成，查询效率提升30%\n- 消息推送接口联调中，预计下周三完成\n## 问题与风险\n- 购物车接口文档存在歧义，需前后端对齐（阻塞前端开发）\n- 测试环境与生产环境配置差异未确认，存在上线风险\n## 技术决策\n- 采用乐观锁处理库存并发，放弃悲观锁方案（性能考量）\n- 图片上传统一走CDN，不再走业务服务器\n## 下周计划\n- 前端：完成结算页、修复搜索bug，开始集成测试\n- 后端：完成消息推送联调，配合测试环境修复", "decisions": "## 代码规范\n- commit信息须包含模块和功能描述，禁止使用update/fix等模糊描述\n## 接口协作规范\n- 接口变更须提前24小时通知对接方，并更新接口文档", "todos": "## 开发任务\n### 前端\n- 【张三】完成购物车结算页（本周五）\n- 【张三】修复商品搜索关键词高亮问题（明天）\n### 后端\n- 【李四】完成消息推送接口联调（下周三）\n## 上线准备\n- 【王五】确认测试环境与生产环境配置差异（今天）\n- 【运维】更新生产环境部署文档（本周四前）"}'

negative_constraints:
  - 【强制】禁止在 minutes/decisions/todos 中输出无 ## 标题的散装要点，必须先用 ## 分组再列要点
  - 每条要点须写清具体内容（进度数据、技术方案、阻塞原因等），禁止使用"讨论了XX问题""提到了XX风险"等笼统表述
  - 不要把本周已完成的功能和下周计划混淆
  - 不要遗漏明确提及的阻塞点或技术风险
  - todos 须写明负责人和截止日期
  - 技术决策须记录选择理由，不能只写最终方案
  - 不要在开发进度中混入下周计划内容
