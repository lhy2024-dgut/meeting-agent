# ============================================================
# 场景模板：客户访谈
# 适用：产品/销售团队对客户进行需求调研和深度访谈
# ============================================================

scene: 客户访谈
display_name: 客户访谈
description: 产品与销售团队对客户需求的深度访谈，挖掘痛点与合作机会

scene_context: |
  本次会议类型：客户访谈。请重点关注以下内容：
  - 客户基本情况和业务背景（行业、规模、现有工具）
  - 客户痛点和核心需求（尽量贴近原话描述）
  - 现有解决方案的不足之处
  - 双方达成的共识和后续跟进事项
  - 潜在合作信息（预算范围、决策链、时间窗口）

minutes_headings:
  - 客户背景
  - 需求与痛点
  - 现有方案评估
  - 合作意向

example:
  description: SaaS产品与制造业客户的ERP替换需求调研
  output: '{"topic": "制造业ERP替换需求调研与合作意向初步确认", "minutes": "## 客户背景\n- 某制造企业，员工500人，现用某老旧ERP，官方支持已停止\n- IT负责人张总亲自参与，说明项目决策优先级高\n## 需求与痛点\n### 核心痛点\n- 数据孤岛严重：产线数据无法与财务系统实时打通\n- 移动端支持差：现场人员须返回办公室才能录入数据\n### 期望功能\n- 移动端扫码入库和实时库存查询\n- 与现有财务软件API集成，减少人工录入\n## 现有方案评估\n- 曾评估A供应商，因实施周期长（18个月）而放弃\n- 对实施周期要求严格，期望不超过6个月\n## 合作意向\n- 预算区间100-150万，Q3存在决策窗口\n- 决策链：IT负责人推荐 → VP审批 → CEO签字", "decisions": "## 下一步方向\n- 提供制造业场景定制化Demo，重点展示移动端和API集成\n- 提供3个同行业成功案例作为参考", "todos": "## 我方跟进\n- 【销售A】整理客户需求清单并内部对齐（本周五）\n- 【售前B】制作针对制造业场景的Demo（下周二前）\n- 【客户成功C】联系3个参考客户确认是否可提供案例（本周内）\n## 客户承诺\n- 【客户IT负责人】下周提供现有系统接口文档"}'

negative_constraints:
  - 【强制】禁止在 minutes/decisions/todos 中输出无 ## 标题的散装要点，必须先用 ## 分组再列要点
  - 每条要点须写清具体内容（客户原话或核心诉求、痛点细节、数据等），禁止使用"客户提到了XX需求""访谈涉及了XX方面"等笼统表述
  - 不要主观推断客户需求，须基于访谈中的实际表述
  - 预算、决策链等关键信息须如实记录，不要省略或模糊化
  - 不要把客户痛点和我方解决方案混写，须分开记录
  - 后续跟进须明确区分"我方行动"和"客户承诺"
  - 不要美化客户反馈，负面评价须如实呈现
